<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">JV SaaS</div>
      <nav>
        <a href="#" class="active">Dashboard</a>
        <a href="#">Analytics</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
      </nav>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Dashboard</h1>
          <p id="welcome-text">Loading...</p>
        </div>
      </header>

      <section class="stats-grid" id="stats-grid">
      </section>

      <section class="panel-grid">
        <div class="panel">
          <h2>Performance Overview</h2>
          <div class="fake-chart">
            <div class="bar" style="height: 45%"></div>
            <div class="bar" style="height: 70%"></div>
            <div class="bar" style="height: 55%"></div>
            <div class="bar" style="height: 85%"></div>
            <div class="bar" style="height: 60%"></div>
            <div class="bar" style="height: 90%"></div>
            <div class="bar" style="height: 75%"></div>
          </div>
        </div>

        <div class="panel">
          <h2>Recent Activity</h2>
          <ul class="activity-list">
            <li>User registered successfully</li>
            <li>New sale recorded</li>
            <li>Dashboard data updated</li>
            <li>System health stable</li>
          </ul>
        </div>
      </section>

      <section class="panel">
        <h2>Revenue Table</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Metric</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="metrics-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
